name: Sort Master Outage (Manual)

# HANYA boleh trigger MANUAL dari tab "Actions" di GitHub - tiada auto
# trigger (contoh push/schedule), sebab sort ni operasi "sekali-sekala"
# bila perlu, bukan automatik setiap kali data berubah.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sort-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sort_master.py
        run: python scripts/sort_master.py

      - name: Check for changes
        id: git_check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dan push perubahan
        if: steps.git_check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master/master_outage.xlsx
          git commit -m "Sort master outage by Outage Start (terkini di atas) [skip ci]"
          git push

      - name: Tiada perubahan
        if: steps.git_check.outputs.changes == 'false'
        run: echo "Master sudah tersusun, tiada perubahan."
