name: Generate Daily Report (Manual)

# HANYA boleh trigger MANUAL dari tab "Actions" - tiada auto schedule,
# sebab ko dah ada Power Automate flow untuk pickup report + hantar
# ke OneDrive (ko yang kawal bila nak trigger dua-dua).
on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Tarikh khusus untuk backfill (format DD/MM/YYYY). Kosongkan untuk guna semalam."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generate_daily_report.py
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/generate_daily_report.py --date "${{ github.event.inputs.target_date }}"
          else
            python scripts/generate_daily_report.py
          fi

      - name: Check for changes
        id: git_check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dan push report
        if: steps.git_check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Generate daily report [skip ci]"
          git push

      - name: Tiada perubahan
        if: steps.git_check.outputs.changes == 'false'
        run: echo "Tiada row untuk tarikh disasar, report tak dihasilkan."
