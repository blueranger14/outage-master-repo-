name: Generate Daily Report (Manual)

# HANYA boleh trigger MANUAL dari tab "Actions" - tiada auto schedule,
# sebab ko dah ada Power Automate flow untuk pickup report + hantar
# ke OneDrive (ko yang kawal bila nak trigger dua-dua).
on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Tarikh khusus untuk backfill (format DD/MM/YYYY). Kosongkan untuk guna semalam."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generate_daily_report.py
        id: gen_report
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/generate_daily_report.py --date "${{ github.event.inputs.target_date }}"
          else
            python scripts/generate_daily_report.py
          fi

      - name: Check for changes
        id: git_check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dan push report
        if: steps.git_check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Generate daily report [skip ci]"
          git push

      - name: Tiada perubahan
        if: steps.git_check.outputs.changes == 'false'
        run: echo "Tiada row untuk tarikh disasar, report tak dihasilkan."

      # Hantar report ke Power Automate (base64 + rows_json) untuk save
      # OneDrive, email team, DAN update master copy dalam SharePoint
      # (append + resort) - HANYA kalau report berjaya dihasilkan.
      - name: Hantar report ke Power Automate
        if: steps.gen_report.outputs.report_generated == 'true'
        env:
          PA_WEBHOOK_URL: ${{ secrets.DAILY_OUTAGE_BYPASS_EMAIL }}
        run: |
          REPORT_PATH="${{ steps.gen_report.outputs.report_path }}"
          REPORT_FILENAME="${{ steps.gen_report.outputs.report_filename }}"
          ROW_COUNT="${{ steps.gen_report.outputs.row_count }}"

          CONTENT_B64=$(base64 -w 0 "$REPORT_PATH")

          # rows_json datang terus dari step gen_report punya output (dah
          # dalam format JSON array compact), tulis ke fail sementara dulu
          # supaya boleh guna jq --slurpfile (elak isu escaping bila embed
          # terus JSON bertingkat dalam heredoc JSON lain)
          cat > /tmp/rows.json << 'ROWS_EOF'
          ${{ steps.gen_report.outputs.rows_json }}
          ROWS_EOF

          jq -n \
            --arg filename "$REPORT_FILENAME" \
            --arg content "$CONTENT_B64" \
            --arg count "$ROW_COUNT" \
            --slurpfile rows /tmp/rows.json \
            '{filename: $filename, content_base64: $content, row_count: $count, rows_json: $rows[0]}' \
            > /tmp/payload.json

          curl -s -X POST "$PA_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json

          echo "Report dihantar ke Power Automate: $REPORT_FILENAME"
